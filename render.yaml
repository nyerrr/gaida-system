services:
  - type: web
    name: gaida-backend
    runtime: python
    rootDir: backend
    buildCommand: apt-get install -y portaudio19-dev && pip install -r requirements.txt
    startCommand: uvicorn app.main:app --host 0.0.0.0 --port $PORT
    envVars:
      - key: OPENAI_API_KEY
        sync: false
      - key: SUPABASE_URL
        sync: false
      - key: SUPABASE_KEY
        sync: false
      - key: WHISPER_MODEL
        value: medium